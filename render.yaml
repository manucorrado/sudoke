# Render Blueprint — Sudoke staging compute services.
#
# Repo-side configuration only. Syncing this Blueprint into Render, creating
# secrets / custom domains, and the production stack remain manual launch tasks
# (see INFRA_EPICS.md). Editing this file does NOT change live Render services
# until someone explicitly resyncs the Blueprint.
#
# Hybrid provisioning model:
#   - Postgres (`sudoke-postgres-staging`) and Key Value / Redis
#     (`sudoke-redis-staging`) are created and managed OUTSIDE this Blueprint
#     (via the Render dashboard / MCP) so the data layer is never torn down by
#     a Blueprint resync. Their connection strings are wired into the compute
#     services below as `sync: false` env vars (DATABASE_URL / REDIS_URL).
#   - The Docker-based compute services (API, cron, admin) below ARE synced
#     from this file into the `sudoke-staging` environment.
#
# The API normalizes Render's `postgres://` URLs to SQLAlchemy's asyncpg driver
# form at startup. Production is intentionally out of scope here.

services:
  - type: web
    name: sudoke-api-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /api/v1/health/ready
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CHALLENGE_SHARE_BASE_URL
        value: https://staging.sudoke.app/c
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Temporary: lets the admin dashboard authenticate via the
      # X-Dev-Auth-User bypass until Clerk is wired (INFRA_EPICS I6).
      - key: ADMIN_DEV_BYPASS_ENABLED
        value: "true"

  - type: cron
    name: sudoke-cron-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    schedule: "*/5 * * * *"
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: python -m src.jobs.worker tick
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: sudoke-admin-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    dockerContext: .
    dockerfilePath: ./apps/admin/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENVIRONMENT
        value: staging
      # Internal private-network URL of the API. The service name resolves on
      # the Render private network; web services listen on port 10000.
      - key: API_BASE_URL
        value: http://sudoke-api-staging:10000/api/v1
      # Principal used with the X-Dev-Auth-User bypass until Clerk (I6).
      - key: ADMIN_AUTH_PROVIDER_ID
        value: admin-dev
      - key: ADMIN_API_BEARER
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
