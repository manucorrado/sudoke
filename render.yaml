# Render Blueprint for the staging stack.
#
# This file is repo-side configuration only. Creating/linking the actual
# Render services, secrets, custom domains, and production stack remains a
# manual launch task.

databases:
  - name: sudoke-postgres-staging
    plan: basic-1gb
    ipAllowList: []

services:
  - type: keyvalue
    name: sudoke-redis-staging
    plan: starter
    ipAllowList: []

  - type: web
    name: sudoke-api-staging
    runtime: docker
    branch: main
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /api/v1/health/ready
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    releaseCommand: alembic upgrade head
    envVars:
# Render Blueprint — Sudoke staging compute services.
#
# Hybrid provisioning model (see INFRA_EPICS.md):
#   - Postgres + Key Value (Redis) are created via the Render MCP / dashboard
#     and live outside this Blueprint, so the data layer can be reused and is
#     not torn down with a Blueprint resync.
#   - The Docker-based compute services below (API, cron, admin) are synced
#     from this file into a dedicated "sudoke-staging" environment.
#
# DATABASE_URL and REDIS_URL are marked `sync: false` and are populated from
# the managed Postgres/Key Value connection strings after the services exist
# (the API normalizes postgres:// URLs to the asyncpg driver automatically).
# Production is intentionally out of scope.

services:
  - type: web
    name: sudoke-api-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /api/v1/health/ready
    autoDeploy: true
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: sudoke-postgres-staging
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sudoke-redis-staging
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CHALLENGE_SHARE_BASE_URL
        value: https://staging.sudoke.app/c
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      # Temporary: lets the admin dashboard authenticate via the
      # X-Dev-Auth-User bypass until Clerk is wired (INFRA_EPICS I6).
      - key: ADMIN_DEV_BYPASS_ENABLED
        value: "true"
      # Set once browser clients (e.g. Expo web) need direct API access.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: cron
    name: sudoke-cron-staging
    runtime: docker
    branch: main
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    schedule: "* * * * *"
    startCommand: python -m src.jobs.worker tick
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: sudoke-postgres-staging
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sudoke-redis-staging
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
    region: oregon
    plan: starter
    branch: main
    schedule: "*/5 * * * *"
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    autoDeploy: true
    dockerCommand: python -m src.jobs.worker tick
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: sudoke-admin-staging
    runtime: node
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @sudoke/admin build
    startCommand: pnpm --filter @sudoke/admin start -- -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_API_BEARER
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./apps/admin/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENVIRONMENT
        value: staging
      # Internal private-network URL of the API. Service name resolves on
      # the Render private network; web services listen on port 10000.
      - key: API_BASE_URL
        value: http://sudoke-api-staging:10000/api/v1
      # Principal used with the X-Dev-Auth-User bypass until Clerk (I6).
      - key: ADMIN_AUTH_PROVIDER_ID
        value: admin-dev
