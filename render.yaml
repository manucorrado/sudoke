# Render Blueprint — Sudoke staging compute services.
#
# Hybrid provisioning model (see INFRA_EPICS.md):
#   - Postgres + Key Value (Redis) are created via the Render MCP / dashboard
#     and live outside this Blueprint, so the data layer can be reused and is
#     not torn down with a Blueprint resync.
#   - The Docker-based compute services below (API, cron, admin) are synced
#     from this file into a dedicated "sudoke-staging" environment.
#
# DATABASE_URL and REDIS_URL are marked `sync: false` and are populated from
# the managed Postgres/Key Value connection strings after the services exist
# (the API normalizes postgres:// URLs to the asyncpg driver automatically).
# Production is intentionally out of scope.

services:
  - type: web
    name: sudoke-api-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /api/v1/health/ready
    autoDeploy: true
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: API_V1_PREFIX
        value: /api/v1
      # Temporary: lets the admin dashboard authenticate via the
      # X-Dev-Auth-User bypass until Clerk is wired (INFRA_EPICS I6).
      - key: ADMIN_DEV_BYPASS_ENABLED
        value: "true"
      # Set once browser clients (e.g. Expo web) need direct API access.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: cron
    name: sudoke-cron-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    schedule: "*/5 * * * *"
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    autoDeploy: true
    dockerCommand: python -m src.jobs.worker tick
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: staging
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: sudoke-admin-staging
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./apps/admin/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENVIRONMENT
        value: staging
      # Internal private-network URL of the API. Service name resolves on
      # the Render private network; web services listen on port 10000.
      - key: API_BASE_URL
        value: http://sudoke-api-staging:10000/api/v1
      # Principal used with the X-Dev-Auth-User bypass until Clerk (I6).
      - key: ADMIN_AUTH_PROVIDER_ID
        value: admin-dev
